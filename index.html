<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b101c">
<script>let _t=null;try{_t=localStorage.getItem("theme")}catch(e){}
document.documentElement.dataset.theme=_t||(matchMedia("(prefers-color-scheme: light)").matches?"light":"dark");</script>
<title>地铁键速 · Metro Typing Guangzhou</title>
<link rel="preload" href="assets/fonts/RHR-Regular.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="assets/fonts/RHR-Bold.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="assets/guangzhou-tower-v2.jpg" as="image">
<link rel="preload" href="assets/guangzhou-tower-v2-tower-only.png" as="image">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="fchips">
  <button class="hbtn" id="accBtn" aria-label="Account · 账号">登录</button>
  <button class="hbtn" id="setBtn" aria-label="Settings · 设置" data-i18n="setBtn">⚙ 设置</button>
  <button class="hbtn" id="homeBtn" hidden data-i18n="quitBtn">⏏ 退出</button>
</div>

<!-- ================= MENU ================= -->
<section id="menu">
  <div class="hero intro">
    <img class="hbg" src="assets/guangzhou-tower-v2.jpg" alt="" decoding="async">
    <i class="hmask m1" aria-hidden="true"></i>
    <svg class="rails back" viewBox="0 0 1080 640" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
      <path class="r1" style="--i:0" pathLength="1" d="M -40 96 H 236 a 28 28 0 0 1 28 28 V 160 a 28 28 0 0 0 28 28 H 1120"/>
      <path class="r2" style="--i:1" pathLength="1" d="M 1120 64 H 858 a 30 30 0 0 0 -30 30 V 296 a 30 30 0 0 1 -30 30 H 736 a 26 26 0 0 0 -26 26 V 700"/>
      <path class="r3" style="--i:2" pathLength="1" d="M -40 428 H 210 a 26 26 0 0 1 26 26 V 502 a 26 26 0 0 0 26 26 H 1120"/>
      <path class="r4" style="--i:3" pathLength="1" d="M 1120 612 H 716 a 24 24 0 0 1 -24 -24 V 560 a 24 24 0 0 0 -24 -24 H -40"/>
      <path class="g" style="--i:0" pathLength="1" d="M -40 96 H 236 a 28 28 0 0 1 28 28 V 160 a 28 28 0 0 0 28 28 H 1120"/>
      <path class="g" style="--i:1" pathLength="1" d="M 1120 64 H 858 a 30 30 0 0 0 -30 30 V 296 a 30 30 0 0 1 -30 30 H 736 a 26 26 0 0 0 -26 26 V 700"/>
      <path class="g" style="--i:2" pathLength="1" d="M -40 428 H 210 a 26 26 0 0 1 26 26 V 502 a 26 26 0 0 0 26 26 H 1120"/>
      <path class="g" style="--i:3" pathLength="1" d="M 1120 612 H 716 a 24 24 0 0 1 -24 -24 V 560 a 24 24 0 0 0 -24 -24 H -40"/>
    </svg>
    <svg class="train" viewBox="0 0 360 40" aria-hidden="true">
      <g fill="#22333f">
        <rect x="0" y="6" width="112" height="26" rx="9"/>
        <rect x="120" y="6" width="112" height="26" rx="9"/>
        <rect x="240" y="6" width="112" height="26" rx="9"/>
      </g>
      <g fill="#cfe7fa" opacity=".85">
        <rect x="10" y="12" width="20" height="10" rx="3"/><rect x="36" y="12" width="20" height="10" rx="3"/><rect x="62" y="12" width="20" height="10" rx="3"/><rect x="88" y="12" width="14" height="10" rx="3"/>
        <rect x="130" y="12" width="20" height="10" rx="3"/><rect x="156" y="12" width="20" height="10" rx="3"/><rect x="182" y="12" width="20" height="10" rx="3"/><rect x="208" y="12" width="14" height="10" rx="3"/>
        <rect x="250" y="12" width="20" height="10" rx="3"/><rect x="276" y="12" width="20" height="10" rx="3"/><rect x="302" y="12" width="20" height="10" rx="3"/><rect x="328" y="12" width="14" height="10" rx="3"/>
      </g>
      <rect x="0" y="26" width="352" height="4" fill="var(--amber)" opacity=".9"/>
    </svg>
    <div class="heroTx">
      <h2 class="logo"><b>地</b><b>铁</b><b>键</b><b>速</b></h2>
      <small class="latin">METRO TYPING · GUANGZHOU</small>
      <button class="go" id="startBtn" data-i18n="startBtn">选择关卡</button>
    </div>
    <img class="hfg" src="assets/guangzhou-tower-v2-tower-only.png" alt="" decoding="async">
    <i class="hmask m2" aria-hidden="true"></i>
    <svg class="rails front" viewBox="0 0 1080 640" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
      <path class="r5" style="--i:4" pathLength="1" d="M -40 540 H 300 a 28 28 0 0 0 28 -28 V 470 a 28 28 0 0 1 28 -28 H 1120"/>
      <path class="r6" style="--i:5" pathLength="1" d="M -40 600 H 540 a 24 24 0 0 1 24 24 V 700"/>
      <path class="g" style="--i:4" pathLength="1" d="M -40 540 H 300 a 28 28 0 0 0 28 -28 V 470 a 28 28 0 0 1 28 -28 H 1120"/>
      <path class="g" style="--i:5" pathLength="1" d="M -40 600 H 540 a 24 24 0 0 1 24 24 V 700"/>
    </svg>
    <div class="scue" aria-hidden="true">⌄</div>
    <div class="doors" aria-hidden="true"><i></i><i></i></div>
  </div>

  <div id="pick">
    <div class="blobs" aria-hidden="true"><i class="b1"></i><i class="b2"></i><i class="b3"></i></div>
    <div class="mapcard">
      <svg id="ovMap" role="img" aria-label="Guangzhou Metro network map: Lines 1, 2, 3"></svg>
      <div class="legend" id="legend"></div>
    </div>

    <div class="cards" id="cards"></div>

    <div class="lbcard">
      <div class="lbhead"><h3 data-i18n="lbTitle">全球排行榜</h3><div class="lbtabs" id="lbTabs"></div></div>
      <div class="lbbody" id="lbBody"></div>
    </div>

    <p class="footnote">☆ 本作为粉丝自制打字练习游戏，收录 1 / 2 / 3 号线经典主线区段（不含延长段与支线），
      站间距离为约值。未登录时成绩仅保存在本次会话中；登录后成绩会上传至全球排行榜。</p>
  </div>

  <button class="fab" id="backTop" data-i18n="backTop">↑ 首页</button>
</section>

<!-- ================= GAME ================= -->
<section id="game" hidden>
  <div id="hud">
    <div id="gaugeBox">
      <svg id="gauge" viewBox="0 0 200 128" aria-label="Speedometer"></svg>
    </div>
    <div class="chips">
      <div class="chip"><label data-i18n="chipTime">用时</label><b id="cTime">0:00</b></div>
      <div class="chip"><label data-i18n="chipDist">里程</label><b id="cDist">0.0<small> km</small></b></div>
      <div class="chip"><label data-i18n="chipWpm">键速</label><b id="cWpm">0</b></div>
      <div class="chip"><label data-i18n="chipAcc">准确率</label><b id="cAcc">100<small>%</small></b></div>
      <div class="chip" id="chipCombo"><label data-i18n="chipCombo">连击</label><b id="cCombo">0</b></div>
      <div class="chip"><label data-i18n="chipScore">得分</label><b id="cScore">0</b></div>
    </div>
  </div>

  <div id="mapWrap">
    <svg id="gMap"></svg>
    <div id="toast" role="status"></div>
  </div>

  <div id="bossStage">
    <div class="bossIn">
      <h3 data-i18n="bossTitle">长站名挑战</h3>
      <p data-i18n="bossDesc">13 个最长站名 · 限时输入 · 超时扣 ♥</p>
      <div id="lives">♥♥♥</div>
    </div>
  </div>

  <div id="board">
    <div class="brow">
      <span class="nx" id="brdLabel">下一站</span>
      <span class="tag good" id="dTag">短</span>
      <span class="cnt" id="cnt">1/15</span>
      <span class="tspace"></span>
      <span id="ringBox">
        <svg viewBox="0 0 36 36"><circle class="ring-track" cx="18" cy="18" r="15" fill="none" stroke-width="4"/>
        <circle id="ringArc" cx="18" cy="18" r="15" fill="none" stroke="#ffb020" stroke-width="4"
          stroke-linecap="round" stroke-dasharray="94.2" stroke-dashoffset="0"/></svg>
        <span id="ringSec">10</span>
      </span>
    </div>
    <div id="zh"><span id="zhChip">1</span><span id="zhTxt">体育西路</span></div>
    <div id="py"></div>
    <div id="inRow">
      <span id="pop">+120</span>
      <input id="pyin" type="text" autocomplete="off" autocorrect="off" autocapitalize="off"
        spellcheck="false" enterkeyhint="go" placeholder="在此输入拼音…" aria-label="Type the station name in pinyin">
      <span id="inHint" data-i18n="inHint">无声调 · 空格可省</span>
    </div>
    <div id="pbar"></div>
  </div>
</section>

<!-- ================= RESULT ================= -->
<section id="result" hidden>
  <div class="blobs" aria-hidden="true"><i class="b1"></i><i class="b2"></i></div>
  <div class="rcard" id="rcard">
    <div class="rhead">
      <div class="medal" id="rMedal">🏆</div>
      <div class="rtitle">
        <b id="rTitle">王牌司机 ACE DRIVER<span id="newbest" hidden>NEW BEST</span></b>
        <span id="rSub">1 号线 · 西塱 → 广州东站</span>
        <div class="stars" id="rStars">★★★</div>
      </div>
    </div>
    <div class="rgrid" id="rGrid"></div>
    <div id="heatstrip" title="每站颜色 = 输入速度"></div>
    <p id="fastslow"></p>
    <div class="bdgs" id="newBadges" hidden></div>
    <p class="cloudnote" id="cloudNote" hidden></p>
    <div class="rbtns">
      <button class="go" id="rAgain" style="--cc:var(--amber)" data-i18n="again">再来一次</button>
      <button class="alt" id="rBack" data-i18n="back">选择线路</button>
    </div>
  </div>
</section>

<div id="fx" aria-hidden="true"></div>
<dialog id="accDlg" class="accdlg"></dialog>
<dialog id="setDlg" class="accdlg">
  <h3 data-i18n="setTitle">设置</h3>
  <div class="srow"><span data-i18n="sound">音效</span>
    <button class="hbtn on" id="soundBtn" aria-label="Sound on or off" aria-pressed="true">音效</button></div>
  <div class="srow"><span data-i18n="setTheme">主题</span>
    <button class="hbtn" id="themeBtn" aria-label="Switch theme">深色</button></div>
  <div class="srow"><span data-i18n="setLang">语言</span>
    <button class="hbtn" id="langBtn" aria-label="Switch language · 切换语言">中文</button></div>
  <div class="dbtns"><button class="dbtn alt" id="setClose" data-i18n="accClose">关闭</button></div>
</dialog>

<script src="js/geo.js"></script>
<script src="js/data.js"></script>
<script src="js/game.js"></script>
<script src="js/cloud.js"></script>
</body>
</html>
